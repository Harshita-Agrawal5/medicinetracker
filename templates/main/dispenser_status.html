<!DOCTYPE html>
<html>
<head>
    <title>Dispenser Status</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fb;
        }

        .card {
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .status-ok {
            color: green;
            font-weight: bold;
        }

        .status-empty {
            color: red;
            font-weight: bold;
        }

        .status-wrong {
            color: orange;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4 text-center">💊 Dispenser Monitoring Dashboard</h2>

    <div class="row">

        {% for slot in slots %}

        <div class="col-md-4 mb-4">
            <div class="card shadow p-3">

                <h5>{{ slot.medicine_name }}</h5>
                <p><strong>Quantity:</strong> {{ slot.quantity }}</p>

                {% if slot.quantity == 0 %}
                    <p class="status-empty">⚠️ EMPTY</p>

                {% elif slot.actual_medicine and slot.actual_medicine != slot.expected_medicine %}
                    <p class="status-wrong">❌ WRONG MEDICINE</p>

                {% else %}
                    <p class="status-ok">✅ OK</p>

                {% endif %}

            </div>
        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
