{% extends 'main/base.html' %}
{% block content %}

<div class="container mt-4">

    <div class="card shadow-lg border-0 p-4">

        <h3 class="text-center mb-4">✏ Edit Profile</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Age</label>
                    <input type="number" name="age" class="form-control" value="{{ profile.age }}">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Gender</label>
                    <select name="gender" class="form-select">
                        <option value="">Select</option>
                        <option value="Male" {% if profile.gender == "Male" %}selected{% endif %}>Male</option>
                        <option value="Female" {% if profile.gender == "Female" %}selected{% endif %}>Female</option>
                        <option value="Other" {% if profile.gender == "Other" %}selected{% endif %}>Other</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control" value="{{ profile.phone }}">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Address</label>
                    <input type="text" name="address" class="form-control" value="{{ profile.address }}">
                </div>

                <div class="col-12 mb-3">
                    <label class="form-label">Medical History</label>
                    <textarea name="medical_history" class="form-control" rows="3">{{ profile.medical_history }}</textarea>
                </div>

            </div>

            <!-- BUTTONS -->
            <div class="text-center mt-3">
                <button type="submit" class="btn btn-success px-4">
                    💾 Save Changes
                </button>

                <button type="button" onclick="history.back()" class="btn btn-secondary px-4">
                    Cancel
                </button>
            </div>

        </form>

    </div>

</div>

{% endblock %}
